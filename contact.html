<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="contact.css" class="stylesheet" />
  </head>
  <header>
  <nav class="navbar">
    <div class="logo">
     <a href="index.html">
            <span class="krewe">
              <span class="k">K</span>
              <span class="r">r</span>
              <span class="e1">e</span>
              <span class="w">w</span>
              <span class="e2">e</span>
            </span>
            <span class="house"> House</span>
          </a>
        </div>

    <!-- Hamburger icon -->
    <div class="menu-toggle" id="menu-toggle">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <!-- Navigation links -->
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="events.html">Events</a></li>
      <li><a href="dining.html">Dining</a></li>
      <li><a href="location.html">Location</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>

<body>
   <section class="contactus">
    </section>

    <section class="contact-form-wrap">
      <form id="contact-form" action="https://formsubmit.co/ajax/anneliegayle@gmail.com" method="POST">
        <div class="contactform">
          <input type="hidden" name="_subject" value="New Krewe House contact form submission" />
          <input type="hidden" name="_captcha" value="false" />
          <input type="hidden" name="_template" value="table" />
          <div class="honeypot-field" aria-hidden="true">
            <label for="website">Leave this field blank</label>
            <input id="website" name="website" type="text" tabindex="-1" autocomplete="off" />
          </div>
          <div class="inputbox">
            <label for="name" class="sr-only">Name</label>
            <input id="name" name="name" type="text" placeholder="Name" required />
          </div>

          <div class="inputbox">
            <label for="email" class="sr-only">Email</label>
            <input id="email" name="email" type="email" placeholder="Email" required />
          </div>

          <div class="inputbox">
            <label for="message" class="sr-only">Message</label>
            <textarea id="message" name="message" placeholder="Message" required></textarea>
          </div>

          <div class="inputbox">
            <input id="submit-button" type="submit" value="Send" />
          </div>
          <p id="form-status" class="form-status" aria-live="polite"></p>
        </div>
      </form>
    </section>

    <div class="footer">
      <p>Design and code by AnnelieStudio     </p>
      <div class="icons">
        <a
          href="https://www.linkedin.com/in/gururaj-math-223360255/"
          target="_blank"
          ><i class="bx bxl-linkedin-square"></i
        ></a>
        <a href="https://codepen.io/gururajmath"
          ><i class="bx bxl-codepen" target="_blank"></i
        ></a>
        <a href="https://github.com/Gururaj-Math" target="_blank"
          ><i class="bx bxl-github"></i
        ></a>
      </div>
    </div>
    <script>
  document.addEventListener("DOMContentLoaded", () => {
    const menuToggle = document.getElementById("menu-toggle");
    const navLinks = document.getElementById("nav-links");
    const contactForm = document.getElementById("contact-form");
    const formStatus = document.getElementById("form-status");
    const submitButton = document.getElementById("submit-button");

    menuToggle.addEventListener("click", () => {
      navLinks.classList.toggle("active");
    });

    contactForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();
      const website = document.getElementById("website").value.trim();

      if (website) {
        formStatus.textContent = "Spam detected. Message was not sent.";
        formStatus.classList.add("error");
        return;
      }

      if (!name || !email || !message) {
        formStatus.textContent = "Please fill out all fields before sending.";
        formStatus.classList.add("error");
        return;
      }

      try {
        submitButton.disabled = true;
        submitButton.value = "Sending...";
        formStatus.textContent = "Sending your message...";
        formStatus.classList.remove("error");

        const formData = new FormData(contactForm);
        const response = await fetch(contactForm.action, {
          method: "POST",
          body: formData,
          headers: {
            Accept: "application/json",
          },
        });

        if (!response.ok) {
          throw new Error("Request failed");
        }

        formStatus.textContent = "Thank you. Your message was sent successfully.";
        formStatus.classList.remove("error");
        contactForm.reset();
      } catch (error) {
        formStatus.textContent = "Something went wrong while sending. Please try again.";
        formStatus.classList.add("error");
      } finally {
        submitButton.disabled = false;
        submitButton.value = "Send";
      }
    });
  });
</script>
  </body>
</html>
